name: Cross-Project Test Targeting

on:
  pull_request:
    branches: [main]

jobs:
  affected-tests:
    name: Run affected tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - uses: astral-sh/setup-uv@v4

      - name: Install code-governance
        run: uv tool install "code-governance @ git+https://github.com/useparadigm/code-governance.git@feat/affected-tests"

      - name: Analyze affected tests
        run: governance-ast --affected-tests . --base-ref origin/main --nx

      - name: Run affected tests
        run: governance-ast --affected-tests . --base-ref origin/main --nx --run
